{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Password Reset Complete</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <link href="{% static 'admin/assets/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css">
    <link rel="shortcut icon" href="{% static 'user/folder/assets/images/avtar/music_clu.png' %}" type="image/x-icon">
    <style>
        * {
            color: #fff;
            margin: 0px;
            padding: 0px;
        }

        @media only screen and (max-width: 600px) {
            body {
                background-color: lightblue;
            }
        }
    </style>

</head>

<body>
    <div class="row w-100" style="height: 580px;">
        <div class="row h-100 mx-auto mt-3 login_div"
            style="background-color: #002428; border-radius: 10px; width: 800px;">

            <div class="col-md-6 my-auto" style="height: 400px; float: right;border-right: 2px solid #7F9193;">
                <div class="col-md-8 display-block mx-auto display-flex h-100"
                    style=" justify-content: center; display: flex; align-items: center;">
                    <img class="" width="300px" height="215px" src="{% static 'user/folder/assets/images/avtar/music_club.png' %}" alt="">
                </div>
            </div>
            <div class="col-md-6 my-auto" style="height: 400px; float: right;">
                <div class="col-md-8 display-block mx-auto" style="height: 100%;">
                    <h1 class="text-center mb-4" style="opacity: 0.6; font-family: 'Architects Daughter', cursive;">
                        Forgot Password
                    </h1>
                    <h5>
                        Your password has been set. You may go ahead and log in now.
                    </h5>
                    <div>
                        <!-- <button></button> -->
                        <a href="/admin/accounts/login/" class="btn pl-4 pr-4 btn-success float-right">Log in</a>
                    </div>
                    <div style="padding-top: 70px; margin-left: -55px;" >
                        <img src="{% static 'user/assets/img/succes.png' %}" alt="">
                    </div>
                    <!-- <p class="text-center mb-4"
                        style="opacity: 0.5; font-family: 'Architects Daughter', cursive; letter-spacing: 1px;">please
                        Login to Admin Dashboard</p>                     -->
                    
                </div>
            </div>
        </div>
    </div>
</body>

</html>
