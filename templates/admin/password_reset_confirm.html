{% load static %}
{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <link href="{% static 'admin/assets/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css">
        <link href="{% static 'admin/assets/css/bootstrap_limitless.min.css' %}" rel="stylesheet" type="text/css">
        <link rel="shortcut icon" href="{% static 'user/folder/assets/images/avtar/music_clu.png' %}" type="image/x-icon">
        <title>Change Password</title>
    </head>
    <body>
        <div class="" style="margin: 3% 0 0 26%;">
            <!-- Page Heading -->
            <div class="card o-hidden border-0 text-center shadow-lg p-4 col-md-8">
                <h1 class="h3 mb-0 text-gray-800">Change Password</h1>
            </div>          

            <!-- Main Content Here -->
            <div class="card o-hidden border-0 col-md-8 shadow-lg">
                <div class="card-body p-0">
                    <div class="row">
                        <div class="col-md-12">
                            <div class="p-5">
                                <form class="form" action="" method="POST" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    {{ form | crispy }}
                                    <button type="submit" class="btn btn-primary btn-lg btn-block"><i class="icon-lock4"></i> Change Password</button>
                                </form>  
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
